# Zackstrap Workflow Refactor Generator File Writing

## Action

Follow the refactor-generator-file-writing workflow:
1. Update core generator logic to add or refactor dry_run/force handling (e.g., add struct fields, new emit_file method)
2. Remove old dry_run_* methods from all generators
3. Update all generator modules to use the new unified method
4. Update command handling to use new generator options
5. Update or add relevant tests to cover new logic

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/generators/common.rs, src/generators/mod.rs, src/commands.rs

